services:
  media-service:
    build: ./media-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  scraper-service:
    build: ./scraper-service
    ports:
      - "8082:8082"
    depends_on:
      - media-service

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: media
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - D:/docker-data/postgres:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - media-service
      - scraper-service